<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0E1726" />
      <stop offset="100%" stop-color="#050A10" />
    </radialGradient>
    
    <!-- Premium Sapphire Gradient -->
    <linearGradient id="sapphire-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>

    <!-- Glassmorphic Card Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="750" fill="url(#bg)" />

  <!-- Cyber Grid Lines -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,75 L 1200,75 M 0,150 L 1200,150 M 0,225 L 1200,225 M 0,300 L 1200,300 M 0,375 L 1200,375 M 0,450 L 1200,450 M 0,525 L 1200,525 M 0,600 L 1200,600 M 0,675 L 1200,675" />
    <path d="M 120,0 L 120,750 M 240,0 L 240,750 M 360,0 L 360,750 M 480,0 L 480,750 M 600,0 L 600,750 M 720,0 L 720,750 M 840,0 L 840,750 M 960,0 L 960,750 M 1080,0 L 1080,750" />
  </g>

  <!-- Ambient Light Spot -->
  <circle cx="600" cy="375" r="300" fill="#2563EB" opacity="0.05" filter="blur(60px)" />

  <!-- Glass Card Cover -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="#0A0E17" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" filter="url(#shadow)" />

  <!-- Center Decorative Glow -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="none" stroke="url(#sapphire-gradient)" stroke-opacity="0.15" stroke-width="4" />

  <!-- Unified Lockup (Name + Logo Together) -->
  <g transform="translate(600, 240)" text-anchor="middle">
    <!-- Combined background capsule -->
    <rect x="-250" y="-45" width="500" height="90" rx="24" fill="#0D1624" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
    
    <!-- NordPass Logo inside capsule -->
    <g transform="translate(-180, -22)">
      <!-- Mountain-N Shield Shape -->
      <path d="M0,8 C0,8 18,0 22,0 C26,0 44,8 44,8 C44,8 44,24 37,36 C30,44 22,48 22,48 C22,48 14,44 7,36 C0,24 0,8 0,8 Z" fill="url(#sapphire-gradient)" />
      <!-- N stylized inside shield -->
      <path d="M14,34 L14,14 L19,14 L28,28 L28,14 L32,14 L32,34 L27,34 L18,20 L18,34 Z" fill="#0A0E17" />
    </g>

    <!-- Unified Brand Name next to the logo -->
    <text x="40" y="15" font-family="'Inter', system-ui, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="4">NORDPASS</text>
  </g>

  <!-- Big Feature Review Title -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <text font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      PREMIUM REVIEW 2026
    </text>
    <text y="60" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="600" fill="#38BDF8" letter-spacing="2">
      FEATURES, PRICING &amp; REAL VALUE
    </text>
  </g>

  <!-- Category & Tech Spec Footer Badge -->
  <g transform="translate(600, 560)" text-anchor="middle">
    <!-- Category pill -->
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#111B2B" fill-opacity="0.9" stroke="#1E3A8A" stroke-width="1" />
    <text y="6" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="800" fill="#38BDF8" letter-spacing="2">PRIVACY &amp; SECURITY</text>
  </g>
</svg>
