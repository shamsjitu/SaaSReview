<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F201C" />
      <stop offset="100%" stop-color="#050C0A" />
    </radialGradient>
    
    <!-- Keeper Green Gradient -->
    <linearGradient id="keeper-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glassmorphic Card Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="750" fill="url(#bg)" />

  <!-- Cyber Grid Lines -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,75 L 1200,75 M 0,150 L 1200,150 M 0,225 L 1200,225 M 0,300 L 1200,300 M 0,375 L 1200,375 M 0,450 L 1200,450 M 0,525 L 1200,525 M 0,600 L 1200,600 M 0,675 L 1200,675" />
    <path d="M 120,0 L 120,750 M 240,0 L 240,750 M 360,0 L 360,750 M 480,0 L 480,750 M 600,0 L 600,750 M 720,0 L 720,750 M 840,0 L 840,750 M 960,0 L 960,750 M 1080,0 L 1080,750" />
  </g>

  <!-- Ambient Light Spot -->
  <circle cx="600" cy="375" r="300" fill="#10B981" opacity="0.05" filter="blur(60px)" />

  <!-- Glass Card Cover -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="#0A1412" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" filter="url(#shadow)" />

  <!-- Center Decorative Glow -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="none" stroke="url(#keeper-green)" stroke-opacity="0.15" stroke-width="4" />

  <!-- Unified Lockup (Name + Logo Together) -->
  <g transform="translate(600, 240)" text-anchor="middle">
    <!-- Combined background capsule -->
    <rect x="-240" y="-45" width="480" height="90" rx="24" fill="#0F2420" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
    
    <!-- Keeper Logo inside capsule -->
    <g transform="translate(-170, -22)">
      <path d="M0,5 C0,5 18,0 22,0 C26,0 44,5 44,5 C44,5 44,24 37,34 C30,44 22,48 22,48 C22,48 14,44 7,34 C0,24 0,5 0,5 Z" fill="url(#keeper-green)" />
      <path d="M22,12 C18,12 15,15 15,19 C15,22 17,25 20,26 L20,34 L24,34 L24,26 C27,25 29,22 29,19 C29,15 26,12 22,12 Z M22,22 C20.5,22 19,20.5 19,19 C19,17.5 20.5,16 22,16 C23.5,16 25,17.5 25,19 C25,20.5 23.5,22 22,22 Z" fill="#0A1412" />
    </g>

    <!-- Unified Brand Name next to the logo -->
    <text x="35" y="15" font-family="'Inter', system-ui, sans-serif" font-size="38" font-weight="900" fill="#FFFFFF" letter-spacing="4">KEEPER</text>
  </g>

  <!-- Big Feature Review Title -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <text font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      FREE VS UNLIMITED
    </text>
    <text y="60" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="600" fill="#34D399" letter-spacing="2">
      IS IT WORTH THE UPGRADE IN 2026?
    </text>
  </g>

  <!-- Category & Tech Spec Footer Badge -->
  <g transform="translate(600, 560)" text-anchor="middle">
    <!-- Category pill -->
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#112A24" fill-opacity="0.9" stroke="#047857" stroke-width="1" />
    <text y="6" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="800" fill="#34D399" letter-spacing="2">PRIVACY &amp; SECURITY</text>
  </g>
</svg>
