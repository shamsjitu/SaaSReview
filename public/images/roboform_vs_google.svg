<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#141E30" />
      <stop offset="100%" stop-color="#0F2027" />
    </radialGradient>
    
    <!-- Split Theme Gradient -->
    <linearGradient id="split-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Glassmorphic Card Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000000" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Background Base -->
  <rect width="1200" height="750" fill="url(#bg)" />

  <!-- Cyber Grid Lines -->
  <g opacity="0.04" stroke="#FFFFFF" stroke-width="1">
    <path d="M 0,75 L 1200,75 M 0,150 L 1200,150 M 0,225 L 1200,225 M 0,300 L 1200,300 M 0,375 L 1200,375 M 0,450 L 1200,450 M 0,525 L 1200,525 M 0,600 L 1200,600 M 0,675 L 1200,675" />
    <path d="M 120,0 L 120,750 M 240,0 L 240,750 M 360,0 L 360,750 M 480,0 L 480,750 M 600,0 L 600,750 M 720,0 L 720,750 M 840,0 L 840,750 M 960,0 L 960,750 M 1080,0 L 1080,750" />
  </g>

  <!-- Ambient Light Spot -->
  <circle cx="600" cy="375" r="300" fill="#3B82F6" opacity="0.05" filter="blur(60px)" />

  <!-- Glass Card Cover -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="#0C1524" fill-opacity="0.8" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2" filter="url(#shadow)" />

  <!-- Center Decorative Glow -->
  <rect x="150" y="125" width="900" height="500" rx="40" fill="none" stroke="url(#split-gradient)" stroke-opacity="0.15" stroke-width="4" />

  <!-- Unified Lockup (Name + Logo Together) -->
  <g transform="translate(600, 240)" text-anchor="middle">
    <!-- Combined background capsule -->
    <rect x="-300" y="-45" width="600" height="90" rx="24" fill="#13243B" fill-opacity="0.7" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5" />
    
    <!-- RoboForm Robot Logo (Left side of unified label) -->
    <g transform="translate(-250, -22)">
      <rect x="0" y="0" width="44" height="44" rx="12" fill="#10B981" />
      <rect x="8" y="14" width="28" height="16" rx="4" fill="#13243B" />
      <circle cx="16" cy="22" r="3" fill="#10B981" />
      <circle cx="28" cy="22" r="3" fill="#10B981" />
      <path d="M 14,8 L 30,8" stroke="#13243B" stroke-width="3" stroke-linecap="round" />
    </g>

    <!-- Unified Brand Names next to their respective logos -->
    <text x="-40" y="15" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" letter-spacing="2">ROBOFORM</text>
    
    <text x="50" y="15" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="500" fill="#94A3B8" letter-spacing="2">VS</text>

    <!-- Google Logo (Right side of unified label) -->
    <g transform="translate(90, -22)">
      <!-- Google key/shield logo icon -->
      <path d="M22,0 C9.8,0 0,9.8 0,22 C0,34.2 9.8,44 22,44 C34.2,44 44,34.2 44,22 C44,9.8 34.2,0 22,0 Z" fill="#3B82F6" />
      <path d="M12,22 L32,22 M22,12 L22,32" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" />
    </g>
    
    <text x="210" y="15" font-family="'Inter', system-ui, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" letter-spacing="2">GOOGLE</text>
  </g>

  <!-- Big Feature Review Title -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <text font-family="'Inter', system-ui, sans-serif" font-size="44" font-weight="900" fill="#FFFFFF" letter-spacing="-1">
      HEAD-TO-HEAD COMPARISON
    </text>
    <text y="60" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="600" fill="#60A5FA" letter-spacing="2">
      FEATURES, SECURITY &amp; SYNC COMPARED
    </text>
  </g>

  <!-- Category & Tech Spec Footer Badge -->
  <g transform="translate(600, 560)" text-anchor="middle">
    <!-- Category pill -->
    <rect x="-120" y="-20" width="240" height="40" rx="20" fill="#132640" fill-opacity="0.9" stroke="#1D4ED8" stroke-width="1" />
    <text y="6" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="800" fill="#60A5FA" letter-spacing="2">PRIVACY &amp; SECURITY</text>
  </g>
</svg>
